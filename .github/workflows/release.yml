name: Release Build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Prepare Pre-compiled Compiler Binary
        run: |
          chmod +x ./compiler/omniflux
          cp ./compiler/omniflux ./omniflux

      - name: Build All Release Packages (VSIX, DEB, Tarballs, ZIP)
        run: |
          make releases

      - name: Create Draft GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            omniflux.deb
            omniflux-linux.tar.gz
            omniflux-macos.tar.gz
            omniflux-windows.zip
            editors/vscode/*.vsix
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
