name: Release Build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-level: '20'

      - name: Compile Native Self-Hosting Compiler
        run: |
          # Use the existing native compiler to compile itself (Self-Hosting Bootstrap)
          chmod +x ./compiler/omniflux
          ./compiler/omniflux compiler/omniflux.of --strict --compile-only

      - name: Test Native Compiler
        run: |
          # Verify that the native compiler can successfully compile a hello-world program
          ./compiler/omniflux examples/01_hello_world.of --compile-only
          ./examples/01_hello_world

      - name: Build All Release Packages (VSIX, DEB, Tarballs, ZIP)
        run: |
          make releases

      - name: Create Draft GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            omniflux.deb
            omniflux-linux.tar.gz
            omniflux-macos.tar.gz
            omniflux-windows.zip
            editors/vscode/*.vsix
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
