@include("views/header.html")

<main class="container docs-layout">
    <!-- Toggle sidebar button for mobile -->
    <button class="docs-toggle-btn" id="docs-sidebar-toggle">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
        <span>Docs Menu</span>
    </button>

    <!-- Sidebar Navigation -->
    <aside class="docs-sidebar">
        <div class="docs-sidebar-title">Documentation</div>
        <ul class="docs-menu">
            @for (doc of catalog) {
                <li class="docs-menu-item @if (doc.slug == active_slug) { active @}">
                    <a href="/docs/{{ doc.slug }}">{{ doc.title }}</a>
                </li>
            @}
        </ul>
    </aside>

    <!-- Main Content Area -->
    <article class="docs-content">
        {{ content }}
    </article>
</main>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const btn = document.getElementById('docs-sidebar-toggle');
        const sidebar = document.querySelector('.docs-sidebar');
        if (btn && sidebar) {
            btn.addEventListener('click', () => {
                sidebar.classList.toggle('active');
                const isActive = sidebar.classList.contains('active');
                btn.querySelector('span').textContent = isActive ? 'Close Docs Menu' : 'Docs Menu';
            });
        }
    });
</script>

@include("views/footer.html")
