@include("views/header.html")

<main class="container" style="margin-top: 3rem;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
        <div>
            <h1 style="font-size: 2.25rem; font-weight: 800; letter-spacing: -0.04em;">Administrative Console</h1>
            <p style="color: var(--text-secondary);">Manage developer accounts, balance allocations, and system roles.</p>
        </div>
        <a href="/dashboard" class="btn btn-secondary">Back to Dashboard</a>
    </div>

    <!-- Search / Filtering Panel -->
    <div class="panel-card" style="margin-bottom: 2rem; padding: 1.5rem 2rem;">
        <div style="display: flex; gap: 1rem; align-items: center;">
            <div style="flex-grow: 1;">
                <label for="search-input" class="form-label" style="margin-bottom: 0.25rem;">Search Accounts</label>
                <input type="text" id="search-input" class="form-input" oninput="loadUsers()" autocomplete="off">
            </div>
            <button onclick="loadUsers()" class="btn btn-cyan" style="align-self: flex-end;">Refresh</button>
        </div>
    </div>

    <!-- Users Table -->
    <div class="panel-card" style="padding: 1.5rem 2rem;">
        <h2 class="panel-title">Registered Accounts</h2>
        
        <div class="data-table-wrapper">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Email Address</th>
                        <th>API Key (End)</th>
                        <th>Tokens Remaining</th>
                        <th>Role</th>
                        <th style="text-align: right;">Actions</th>
                    </tr>
                </thead>
                <tbody id="users-table-body">
                    <!-- Dynamic Rows Loaded Here -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Edit User Modal (Simple CSS / JS modal) -->
    <div id="edit-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(3,7,18,0.85); backdrop-filter: blur(8px); z-index: 1000; align-items: center; justify-content: center;">
        <div class="panel-card" style="width: 100%; max-width: 480px; box-shadow: var(--glow-shadow-purple);">
            <h2 class="panel-title" style="margin-bottom: 1.5rem;">Edit Developer Account</h2>
            
            <form onsubmit="handleEditSubmit(event)">
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="text" id="edit-email" class="form-input" readonly style="background: rgba(255,255,255,0.02); color: var(--text-secondary);">
                </div>
                
                <div class="form-group">
                    <label for="edit-tokens" class="form-label">Tokens Remaining</label>
                    <input type="number" id="edit-tokens" class="form-input" required>
                </div>
                
                <div class="form-group">
                    <label for="edit-role" class="form-label">System Role</label>
                    <select id="edit-role" class="form-input">
                        <option value="user">User</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>
                
                <div style="display: flex; justify-content: flex-end; gap: 1rem; margin-top: 2rem;">
                    <button type="button" onclick="closeEditModal()" class="btn btn-secondary">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                </div>
            </form>
        </div>
    </div>
</main>

<script>
    window.addEventListener('DOMContentLoaded', () => {
        loadUsers();
    });

    async function loadUsers() {
        const query = document.getElementById('search-input').value;
        const tbody = document.getElementById('users-table-body');
        
        try {
            const url = query ? `/api/admin/users?search=${encodeURIComponent(query)}` : '/api/admin/users';
            const response = await fetch(url);
            
            if (!response.ok) {
                if (response.status === 403) {
                    showToast('Forbidden: Admin access only', 'error');
                } else {
                    showToast('Failed to fetch user accounts', 'error');
                }
                return;
            }
            
            const users = await response.json();
            tbody.innerHTML = '';
            
            users.forEach(user => {
                const tr = document.createElement('tr');
                
                const obfuscatedKey = user.api_key ? '...' + user.api_key.slice(-8) : 'None';
                
                tr.innerHTML = `
                    <td><strong>${escapeHtml(user.email)}</strong></td>
                    <td><code style="font-family: var(--font-mono); font-size: 0.85rem;">${obfuscatedKey}</code></td>
                    <td>${user.tokens_remaining.toLocaleString()}</td>
                    <td><span class="role-badge ${user.role}">${user.role}</span></td>
                    <td style="text-align: right;">
                        <button onclick="openEditModal('${escapeHtml(user.email)}', ${user.tokens_remaining}, '${user.role}')" class="btn btn-secondary btn-sm" style="padding: 0.4rem 0.8rem;">Edit</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        } catch (err) {
            showToast('Connection error', 'error');
        }
    }

    function escapeHtml(str) {
        return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
    }

    function openEditModal(email, tokens, role) {
        document.getElementById('edit-email').value = email;
        document.getElementById('edit-tokens').value = tokens;
        document.getElementById('edit-role').value = role;
        document.getElementById('edit-modal').style.display = 'flex';
    }

    function closeEditModal() {
        document.getElementById('edit-modal').style.display = 'none';
    }

    async function handleEditSubmit(event) {
        event.preventDefault();
        const email = document.getElementById('edit-email').value;
        const tokens_remaining = document.getElementById('edit-tokens').value;
        const role = document.getElementById('edit-role').value;
        
        try {
            const response = await fetch('/api/admin/users/update', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, tokens_remaining, role })
            });
            
            if (response.ok) {
                showToast('Developer account updated successfully');
                closeEditModal();
                loadUsers();
            } else {
                const data = await response.json();
                showToast(data.error || 'Failed to update account', 'error');
            }
        } catch (err) {
            showToast('Connection error', 'error');
        }
    }
</script>

@include("views/footer.html")
